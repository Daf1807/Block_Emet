<!DOCTYPE html>
<html lang="es">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<head>
<meta charset="UTF-8"/>

<title>Registro Pedidos - El Misti</title>

<style>
:root{
  --rojo:#8B0000;
  --amarillo:#FFC107;
  --bg:#f4f6f9;
  --card:#ffffff;
  --gris-suave:#f8f9fa;
}


body{
  font-family: 'Poppins', sans-serif;
  margin:0;
  background: linear-gradient(135deg,#f4f6f9,#e9edf3);
  padding-bottom: 100px; /* Espacio para botones flotantes */
}


/* HEADER */
header{
  background:var(--rojo);
  color:white;
  padding:14px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

/* SECCIONES */
section{ padding:12px }

.card{
  background:var(--card);
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  transition:transform .2s ease, box-shadow .2s ease;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 25px rgba(0,0,0,.12);
}


h2{
  color:var(--rojo);
  margin:8px 0;
}

/* PLATOS - AJUSTES PARA MÓVIL Y TAMAÑO */
.item{
  display:flex;
  flex-wrap:nowrap; /* Evitar bajar línea */
  align-items:center;
  gap:8px; /* Espacio ajustado */
  padding:8px 0;
  border-bottom:1px solid #eee;
}

.controls{
  display:flex;
  gap:6px;
  align-items:center;
  flex-shrink: 0;
}

.qty{
  width:40px; 
  text-align:center;
  font-weight:bold;
  border:none;
  font-size:18px;
}

/* BOTONES - MODIFICADOS PARA SER MÁS GRANDES */
button{
  border:none;
  /* 🔥 AUMENTADO: Padding más grande */
  padding: 12px 20px; 
  border-radius:8px;
  cursor:pointer;
  /* 🔥 AUMENTADO: Letra más grande */
  font-size:20px; 
  font-weight:bold;
  transition:all .2s ease;
  display:flex;
  align-items:center;
  justify-content:center;
}

button:hover{
  transform:scale(1.05);
  opacity:.9;
}

.btn{
  background:var(--rojo);
  color:white;
  font-size: 16px; /* Botones generales mantienen tamaño razonable */
  padding: 10px 15px;
}

.big{
  width:100%;
  padding:16px;
  background:var(--amarillo);
  font-weight:bold;
  font-size:18px;
}

/* BOTONES FLOTANTES */
.fab-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  z-index: 1000;
}

.fab {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  color: white;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  cursor: pointer;
  transition: transform 0.2s;
  border: none;
}

.fab:hover { transform: scale(1.1); }

.fab-up { background-color: var(--rojo); }
.fab-down { background-color: var(--amarillo); color: black; }


/* PEDIDOS */
.pedido{
  background:white;
  border-left:6px solid var(--rojo);
  padding:14px;
  margin-bottom:14px;
  border-radius:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
  transition:all .2s ease;
}

.pedido:hover{
  transform:scale(1.01);
}

/* COLORES ESPECIALES PARA COCINA */
.pedido-azul { border-left-color: #2196F3 !important; } 
.pedido-amarillo { border-left-color: #FFC107 !important; } 

/* ESTILOS PARA VISTA IMPRIMIR */
.imprimir-card {
    background: white;
    border: 2px solid #000;
    padding: 15px;
    margin-bottom: 20px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 16px;
    line-height: 1.4;
    color: #000;
    position: relative;
}

.imprimir-header {
    font-weight: bold;
    border-bottom: 1px dashed #000;
    padding-bottom: 5px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.imprimir-copy-btn {
    background: #333;
    color: white;
    border: none;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
}

.imprimir-section {
    margin-bottom: 8px;
}
.imprimir-label {
    font-weight: bold;
    text-decoration: underline;
}


/* GRID PC */
@media(min-width:700px){
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
}

.timer-box{
  display:inline-block;
  padding:6px 12px;
  border-radius:8px;
  font-weight:bold;
  font-size:16px;
  transition:all .3s ease;
}

.timer-green{
  background:#d4edda;
  color:#155724;
}

.timer-orange{
  background:#fff3cd;
  color:#856404;
}

.timer-red{
  background:#f8d7da;
  color:#721c24;
  animation:parpadeo 1s infinite;
}

@keyframes parpadeo{
  0%{opacity:1}
  50%{opacity:.5}
  100%{opacity:1}
}

.progress-bar{
  height:6px;
  background:#eee;
  border-radius:4px;
  margin-top:6px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:0%;
  background:#28a745;
  transition:width .5s linear;
}

/* COLUMNAS INI Y DISP */
.colIni{
  width:40px; 
  padding:4px;
  border-radius:6px;
  border:1px solid #e0e0e0;
  font-weight:600;
  text-align:center;
  background:#f8f9fa;
  font-size:14px;
  transition:all .25s ease;
  outline:none;
  flex-shrink: 0;
}

.colIni:hover{
  border-color:#bdbdbd;
  transform:scale(1.05);
}

.colIni:focus{
  border-color:#4CAF50;
  box-shadow:0 0 0 2px rgba(76,175,80,.2);
  background:white;
}

.colIni:not([value="0"]){
  border-color:#4CAF50;
  background:#f1fff4;
}

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button{
    opacity:1;
  }

/* NOMBRE PLATO */
.nombrePlato{
  flex:1;
  min-width: 80px;
  padding:8px 10px;
  font-size:16px;
  font-weight:600;
  border-radius:8px;
  border:2px solid #e0e0e0;
  background:#ffffff;
  transition:all .25s ease;
  outline:none;
}

.nombrePlato:hover{
  border-color:#bdbdbd;
}

.nombrePlato:focus{

}

.filaMenu{

  align-items:center;
}

#tipo{

}

.tipoSelector{

}

.tipoSelector button{

  font-weight:600;

  cursor:pointer;

}

.tipoSelector button:hover{

}

.tipoSelector button.activo{

  color:white;
  border-color:#4CAF50;

}

/* 🔥 ESTILO PARA BOTONES DE MESAS - GRID */

  grid-template-columns: repeat(4, 1fr); /* 4 columnas para móvil */
  gap: 8px; /* Espacio entre botones */

}

#mesasBotones button {

}

/* Ajuste para PC (más columnas) */

/* Ajustes específicos para móvil */

/* =================================================

async function enviarImpresion(index){
  const pedido = pedidos[index];
  if(!pedido) return;

  const texto = obtenerTextoPlano(pedido);

  try {
    await db.collection("cola_impresion").add({

  }

  mostrar();
}




/* =================================================
  🔥 NUEVA LÓGICA COCINA: MESA + ALISTAR + CUADROS
================================================= */
function mostrarCocina(){

  // Filtramos: Solo MESA y ALISTAR
  const pedidosActivos = pedidos.filter(p => (p.tipo === "mesa" || p.tipo === "alistar") && !p.atendido);

  let acumuladoEntradasSalon = {};
  let acumuladoSegundosSalon = {};
  let acumuladoEntradasLlevar = {};
  let acumuladoSegundosLlevar = {};

  const procesarItems = (lista, pedido, mapTotales, tipoGrupo) => {
    lista.forEach(item=>{
      const partes = item.split(" - ");
      const cantidad = parseInt(partes[0]) || 0;
      
      let nombreCompleto = partes[1]?.trim() || "";
      let nombreBase = nombreCompleto.split("|")[0].trim();
      let nota = "";
      
      if(nombreCompleto.includes("| NOTA:")){
        nota = nombreCompleto.split("| NOTA:")[1].trim();
      }

      let servidos = 0;
      if(pedido.servidos && pedido.servidos[tipoGrupo] && pedido.servidos[tipoGrupo][nombreBase]){
          servidos = pedido.servidos[tipoGrupo][nombreBase].length;
      }

      const pendiente = cantidad - servidos;

      if(pendiente > 0){
        if(!mapTotales[nombreBase]){
            mapTotales[nombreBase] = { total: 0, notas: {} };
        }
        mapTotales[nombreBase].total += pendiente;

        if(nota){
            if(!mapTotales[nombreBase].notas[nota]){
                mapTotales[nombreBase].notas[nota] = 0;
            }
            mapTotales[nombreBase].notas[nota] += pendiente;
        }
      }
    });
  };

  pedidosActivos.forEach(p=>{

    const esLlevar = (p.tipo === "alistar");
    const mapEntradas = esLlevar ? acumuladoEntradasLlevar : acumuladoEntradasSalon;
    const mapSegundos = esLlevar ? acumuladoSegundosLlevar : acumuladoSegundosSalon;

    procesarItems(p.detalleEntradas, p, mapEntradas, 'entrada');
    procesarItems(p.detalleSegundos, p, mapSegundos, 'segundo');
  });

  let htmlAcumulados = `<div class="cocina-header-split">`;
  
  const renderizarMapa = (map) => {
      let html = "";
      for(let nombre in map){
          const info = map[nombre];
          html += `<div class="cocina-item-row"><div>${nombre}</div><div style="color:#FFC107;font-weight:bold">${info.total}</div></div>`;
          
          for(let nota in info.notas){
              const cantNota = info.notas[nota];
              html += `<div class="cocina-sub-nota">↳ ${nota} (${cantNota})</div>`;
          }
      }
      return html;
  };

function marcarEntregado(pedidoIndex, tipo, itemIndex, cuadritoIndex){

  let id = `chk_${pedidoIndex}_${tipo}_${itemIndex}_${cuadritoIndex}`;
  let cuadro = document.getElementById(id);

  if(!pedidos[pedidoIndex].servidos){
    pedidos[pedidoIndex].servidos = {
      entrada: {},
      segundo: {}
    };
  }

  const grupo = tipo; 

  const itemTexto = grupo === "entrada"
    ? pedidos[pedidoIndex].detalleEntradas[itemIndex]
    : pedidos[pedidoIndex].detalleSegundos[itemIndex];

  const nombre = itemTexto.split(" - ")[1]?.split("|")[0].trim();

  if(!pedidos[pedidoIndex].servidos[grupo][nombre]){
    pedidos[pedidoIndex].servidos[grupo][nombre] = [];
  }

  if(cuadro.style.background === "green"){

    cuadro.style.background = "";

    pedidos[pedidoIndex].servidos[grupo][nombre] =
      pedidos[pedidoIndex].servidos[grupo][nombre]
      .filter(i => i !== cuadritoIndex);

  }else{

    cuadro.style.background = "green";

    pedidos[pedidoIndex].servidos[grupo][nombre]
      .push(cuadritoIndex);

  }

  guardarHistorial();
  mostrar();

  if(vistaActual === "cocina"){
    mostrarCocina();
  }

}

          function escucharStock(seccion, total, prefijo){

            for(let i=0;i<total;i++){

              const id = prefijo+i;

              const ref = db.collection("stock")
                .doc(seccion)
                .collection("items")
                .doc(id);

              ref.get().then(doc=>{
                if(!doc.exists){
                  ref.set({
                    inicial: 0,
                    vendido: 0,
                    nombre: ""
                  });
                }
              });

              ref.onSnapshot(doc=>{

                if(!doc.exists) return;

                const data = doc.data();

                const inicial = data.inicial || 0;
                const vendido = data.vendido || 0;
                const nombre = data.nombre || "";

                const disponible = Math.max(inicial - vendido, 0);

                const inputNombre = document.querySelector(
                  `input[data-nombre='${id}']`
                );
                if(inputNombre){
                  inputNombre.value = nombre;
                  if(disponible <= 0){
                     inputNombre.style.color = "#d32f2f"; 
                     inputNombre.style.borderColor = "#d32f2f";
                  } else {
                     inputNombre.style.color = "black";
                     inputNombre.style.borderColor = "#e0e0e0";
                  }
                }

                const inputIni = document.querySelector(
                  `input[data-stock='${id}']`
                );
                if(inputIni){
                  inputIni.value = inicial;
                }

                const span = document.getElementById("disp_"+id);
                if(span){
                  span.innerText = disponible;
                  span.style.color = disponible<=0 ? "red" : "black";
                }

              });

            }

          }

          /* REGISTRAR */
          function registrarPedido(){

            let total=0;
            let ent=0, seg=0;

            let detalleEntradas=[];
            let detalleSegundos=[];
            let detalleExtras=[];
            let detalleEnvases=[];

            /* ENTRADAS */
            for(let i=0;i<TOTAL_ENTRADAS;i++){
              const nombre = document.querySelector(`input[data-nombre='E${i}']`)?.value;
              const c=+document.getElementById("E"+i).value;

              if(nombre && c>0){

                const nota=document.getElementById("nota_E"+i)?.value || "";

                let texto=`${c} - ${nombre}`;
                db.collection("stock")
                  .doc("entradas")
                  .collection("items")
                  .doc("E"+i)
                  .set({
                    vendido: firebase.firestore.FieldValue.increment(c)
                  }, { merge:true });


                if(nota) texto+=` | NOTA: ${nota.toUpperCase()}`;

                detalleEntradas.push(texto);
                ent+=c;
              }

            }

            /* SEGUNDOS */
            for(let i=0;i<TOTAL_SEGUNDOS;i++){
              const nombre = document.querySelector(`input[data-nombre='S${i}']`)?.value;
              const c=+document.getElementById("S"+i).value;

              if(nombre && c>0){

                const nota=document.getElementById("nota_S"+i)?.value || "";

                let texto=`${c} - ${nombre}`;
                db.collection("stock")
                  .doc("segundos")
                  .collection("items")
                  .doc("S"+i)
                  .set({
                    vendido: firebase.firestore.FieldValue.increment(c)
                  }, { merge:true });


                if(nota) texto+=` | NOTA: ${nota.toUpperCase()}`;

                detalleSegundos.push(texto);
                seg+=c;
              }

            }

            const menus=Math.min(ent,seg);

            total+=menus*13;
            total+=(seg-menus)*10;
            total+=(ent-menus)*5;

            /* EXTRAS (IGUAL) */
            extrasComida.forEach(e=>{
              const c=+document.getElementById(e.nombre).value;
              if(c>0){
                detalleExtras.push(`${c} - ${e.nombre}`);
                total+=c*e.precio;
              }
            });

            /* ENVASES ELIMINADO DEL CÁLCULO DE REGISTRO */
            /*
            envases.forEach(e=>{
              const c=+document.getElementById(e.nombre).value;
              if(c>0){
                detalleEnvases.push(`${c} - ${e.nombre}`);
                total+=c*e.precio;
              }
            });
            */

            /* DELIVERY ELIMINADO DEL CÁLCULO DE REGISTRO */
            /*
            const delivery=+deliveryCosto.value;
            total+=delivery;
            */

          if(detalleEntradas.length===0 && detalleSegundos.length===0){
            alert("No hay platos en el pedido");
            return;
          }


          const tipoActual = document.getElementById("tipo").value;

          let horaExacta = null;
          let timestamp = null;

          if(tipoActual === "mesa" || tipoActual === "alistar"){
            const ahora = new Date();
            horaExacta = ahora.toLocaleTimeString("es-PE", {
              hour: "2-digit",
              minute: "2-digit",
              second: "2-digit"
            });
            timestamp = Date.now();
          }


          pedidos.push({
            tipo: tipoActual,
            mesa: document.getElementById("mesa").value,
            hora: horaExacta,
            horaRegistro: timestamp,
            atendido: false,
            colapsado: false,
            detalleEntradas: detalleEntradas,
            detalleSegundos: detalleSegundos,
            detalleExtras: detalleExtras,
            detalleEnvases: detalleEnvases, // Se mantiene la propiedad vacía para compatibilidad
            total: total,
          });

            document.getElementById("mesa").value = "";


            guardarHistorial();
            mostrar();
            reset();
          }

/* LÓGICA DE TEXTO PARA COPIAR */
function obtenerTextoPlano(pedido){
    let texto = "";
    
    const nombre = (pedido.mesa || "").toUpperCase();
    const hora = pedido.hora || "";
    
    if(pedido.tipo === 'mesa') {
        texto += `| MESA ${nombre} | ${nombre} | ${hora}\n`;
    } else if (pedido.tipo === 'llevar') {
        texto += `| LLEVAR | ${nombre} | ${hora}\n`;
    } else if (pedido.tipo === 'reserva') {
        texto += `| RESERVA | ${nombre} | ${hora}\n`;
    }

    if(pedido.detalleEntradas.length > 0){
        pedido.detalleEntradas.forEach(item => {
            let partes = item.split(" - ");
            let qty = partes[0];
            let resto = partes[1] || "";
            
            let nota = "";
            if(resto.includes("| NOTA:")){
                let splitNota = resto.split("| NOTA:");
                resto = splitNota[0].trim();
                nota = splitNota[1].trim();
            }

            texto += `${qty} - ${resto}\n`;
            
            if(nota){
                texto += `Nota: ${nota}\n`;
            }
        });
        texto += "\n"; 
    }

    if(pedido.detalleSegundos.length > 0){
        pedido.detalleSegundos.forEach(item => {
            let partes = item.split(" - ");
            let qty = partes[0];
            let resto = partes[1] || "";
            
            let nota = "";
            if(resto.includes("| NOTA:")){
                let splitNota = resto.split("| NOTA:");
                resto = splitNota[0].trim();
                nota = splitNota[1].trim();
            }

            texto += `${qty} - ${resto}\n`;
            
            if(nota){
                texto += `Nota: ${nota}\n`;
            }
        });
    }

    return texto;
}
/* FUNCIÓN PARA COPIAR AL PORTAPAPELES */
function copiarTextoPedido(index){
    const pedido = pedidos[index];
    if(!pedido) return;

    const texto = obtenerTextoPlano(pedido);

    navigator.clipboard.writeText(texto).then(() => {
        alert("✅ Pedido copiado al portapapeles");
    }).catch(err => {
        console.error("Error al copiar: ", err);
        alert("❌ Error al copiar");
    });
}

          function calcularTiempoFinal(inicio){

            const ahora = Date.now();
            const diff = ahora - inicio;

            const minutos = Math.floor(diff / 60000);
            const segundos = Math.floor((diff % 60000) / 1000);

            return `${minutos.toString().padStart(2,"0")}:${segundos.toString().padStart(2,"0")}`;
          }

            const segundos = Math.floor((diff % 60000) / 1000);

            pedidos[index].tiempoFinal =
              `${minutos.toString().padStart(2,"0")}:`+

            listaImprimir.forEach((p,i)=>{
              columnasPedidos[i % COLUMNAS].push(p);
            });

            const filas = [];
            const maxFilas = Math.max(...columnasPedidos.map(c=>c.length));

            for(let f=0; f<maxFilas; f++){

              const rowCells = [];

              for(let c=0; c<COLUMNAS; c++){

                const pedido = columnasPedidos[c][f];

                if(pedido){

                  const contenido = [];

                  contenido.push(
                    new Paragraph({
                      children:[
                        new TextRun({
                          text:(pedido.mesa||"SIN NOMBRE").toUpperCase(),
                          bold:true,
                          size:30
                        })
                      ],
                      spacing:{ after:100 }
                    })
                  );

                  contenido.push(
                     new Paragraph({
                      children:[
                        new TextRun({
                          text:pedido.tipo.toUpperCase(),
                          color:"999999",
                          size:20
                        })
                      ],
                      spacing:{ after:100 }
                    })
                  );

                  pedido.detalleEntradas.forEach(l=>{
                    contenido.push(
                      new Paragraph({
                        children:[ new TextRun({ text:l, size:24 }) ]
                      })
                    );
                  });

                  pedido.detalleSegundos.forEach(l=>{
                    contenido.push(
                      new Paragraph({
                        children:[ new TextRun({ text:l, size:24 }) ]
                      })
                    );
                  });

                  rowCells.push(
                    new TableCell({
                      width:{ size:100/COLUMNAS, type:WidthType.PERCENTAGE },
                      margins:{ top:100, bottom:100, left:150, right:150 },
                      borders:{
                        left:{style:BorderStyle.SINGLE, size:4, color:"cccccc"},
                        right:{style:BorderStyle.SINGLE, size:4, color:"cccccc"},
                        top:{style:BorderStyle.NONE},
                        bottom:{style:BorderStyle.NONE}
                      },
                      children:contenido
                    })
                  );

                } else {

                  rowCells.push(
                    new TableCell({
                      width:{ size:100/COLUMNAS, type:WidthType.PERCENTAGE },
                      children:[new Paragraph("")]
                    })
                  );

                }

              }

              filas.push(new TableRow({ children: rowCells }));

            }

            const tabla = new Table({
              width:{ size:100, type:WidthType.PERCENTAGE },
              rows: filas
            });

            const doc = new Document({
              sections:[{
                properties:{
                  page:{
                    size:{ orientation:"landscape" },
                    margin:{ top:250, right:250, bottom:250, left:250 }
                  }
                },
                children:[tabla]
              }]
            });

            const blob = await Packer.toBlob(doc);

            const link=document.createElement("a");
            link.href=URL.createObjectURL(blob);
            link.download="Pedidos-"+tipoFiltrado+"-ElMisti.docx";
            link.click();
          }




          </script>
